name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/build-and-deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/todo-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update values.yaml with new image tag
        run: |
          FULL_TAG="${{ steps.meta.outputs.tags }}"
          echo "Full tag: $FULL_TAG"
          
          TAG=$(echo "$FULL_TAG" | rev | cut -d: -f1 | rev)
          echo "Extracted tag: $TAG"
          
          sed -i.bak "s|repository:.*|repository: ghcr.io/${{ github.repository }}/todo-app|" todo-chart/values.yaml
          sed -i.bak "s|tag:.*|tag: $TAG|" todo-chart/values.yaml
          
          echo "Updated values.yaml:"
          cat todo-chart/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add todo-chart/values.yaml
            git commit -m "Update image tag to ${{ steps.meta.outputs.tags }}"
            git push
          fi